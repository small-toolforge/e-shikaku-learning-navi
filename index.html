<html lang="ja">
<head>

<title>E資格 学習ナビ</title>
<style>
:root{
  --paper:#FAF9F4; --card:#FFFFFF; --ink:#23262C; --sub:#6E727A;
  --line:#E6E3DA; --shu:#C73E3A; --shu-soft:#FAEDEC;
  --ai:#2A5A8C; --ai-soft:#EAF1F8; --mist:#F1EFE8;
  --radius:14px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; padding:0; background:var(--paper); color:var(--ink);
  font-family:"BIZ UDPGothic","Hiragino Kaku Gothic ProN","Yu Gothic UI","Meiryo",sans-serif;
  font-size:16px; line-height:1.65;}
body{padding-bottom:calc(64px + env(safe-area-inset-bottom));}
button{font-family:inherit; font-size:1rem; cursor:pointer;}
ruby rt{font-size:0.55em; color:var(--sub); letter-spacing:0.05em;}
pre{background:#20242B; color:#E8EAF0; border-radius:10px; padding:12px 14px;
  overflow-x:auto; font-family:"Consolas","SF Mono","Menlo",monospace; font-size:0.85rem; line-height:1.6;}
code{font-family:"Consolas","SF Mono","Menlo",monospace;}

/* ---------- layout ---------- */
header.app{position:sticky; top:0; z-index:10; background:var(--paper);
  border-bottom:1px solid var(--line); padding:10px 16px calc(8px);
  display:flex; align-items:baseline; gap:10px;}
header.app h1{font-size:1.05rem; margin:0; font-weight:700; letter-spacing:0.02em;}
header.app .sub{font-size:0.75rem; color:var(--sub);}
main{max-width:760px; margin:0 auto; padding:16px;}
@media(min-width:900px){ main{max-width:860px;} }

nav.tabs{position:fixed; bottom:0; left:0; right:0; z-index:20;
  background:var(--card); border-top:1px solid var(--line);
  display:flex; justify-content:space-around;
  padding:6px 4px calc(6px + env(safe-area-inset-bottom));}
nav.tabs button{background:none; border:none; color:var(--sub);
  display:flex; flex-direction:column; align-items:center; gap:2px;
  font-size:0.68rem; padding:4px 10px; border-radius:10px; min-width:58px;}
nav.tabs button .ic{font-size:1.25rem; line-height:1;}
nav.tabs button.active{color:var(--ai); font-weight:700; background:var(--ai-soft);}

.view{display:none;} .view.active{display:block; animation:fade .18s ease;}
@keyframes fade{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:none;}}

/* ---------- cards & common ---------- */
.card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
  padding:16px; margin-bottom:14px;}
.card h2{font-size:0.95rem; margin:0 0 10px; font-weight:700;}
.eyebrow{font-size:0.7rem; color:var(--sub); letter-spacing:0.12em; margin-bottom:4px;}
.big{font-size:1.9rem; font-weight:700; line-height:1.2;}
.row{display:flex; gap:10px; flex-wrap:wrap;}
.stat{flex:1; min-width:90px; background:var(--mist); border-radius:10px; padding:10px 12px;}
.stat .v{font-size:1.35rem; font-weight:700;}
.stat .l{font-size:0.7rem; color:var(--sub);}
.btn{display:block; width:100%; border:none; border-radius:12px; padding:14px;
  font-weight:700; margin-top:10px; text-align:center;}
.btn.primary{background:var(--ai); color:#fff;}
.btn.ghost{background:var(--card); color:var(--ai); border:1.5px solid var(--ai);}
.btn.shu{background:var(--shu); color:#fff;}
.btn.small{padding:9px 12px; font-size:0.85rem; margin-top:8px;}
.btn:disabled{opacity:0.45; cursor:default;}
.tag{display:inline-block; font-size:0.68rem; padding:2px 8px; border-radius:999px;
  background:var(--mist); color:var(--sub); margin-right:6px;}
.tag.shu{background:var(--shu-soft); color:var(--shu); font-weight:700;}
.tag.ai{background:var(--ai-soft); color:var(--ai); font-weight:700;}
.muted{color:var(--sub); font-size:0.82rem;}
.divider{border:none; border-top:1px dashed var(--line); margin:14px 0;}
.plist{list-style:none; margin:0; padding:0;}
.plist li{padding:10px 0; border-bottom:1px solid var(--line); display:flex; gap:10px; align-items:flex-start;}
.plist li:last-child{border-bottom:none;}
.plist .why{font-size:0.72rem; color:var(--shu); font-weight:700;}

/* ---------- quiz ---------- */
.choice{display:block; width:100%; text-align:left; margin-top:8px;
  background:var(--card); border:1.5px solid var(--line); border-radius:12px;
  padding:12px 14px; line-height:1.5;}
.choice .abc{display:inline-block; width:1.6em; font-weight:700; color:var(--ai);}
.choice.sel{border-color:var(--ai); background:var(--ai-soft);}
.choice.correct{border-color:var(--ai); background:var(--ai-soft); font-weight:700;}
.choice.wrong{border-color:var(--shu); background:var(--shu-soft);}
.choice:disabled{cursor:default; opacity:0.9;}
.confbar{display:flex; gap:8px; margin-top:12px;}
.confbar button{flex:1; border:1.5px solid var(--line); background:var(--card);
  border-radius:10px; padding:10px 4px; font-size:0.85rem;}
.confbar button.sel{border-color:var(--ai); background:var(--ai-soft); font-weight:700;}
.reasons{display:flex; flex-wrap:wrap; gap:8px; margin-top:8px;}
.reasons button{border:1.5px solid var(--line); background:var(--card);
  border-radius:999px; padding:7px 12px; font-size:0.78rem;}
.reasons button.sel{border-color:var(--shu); background:var(--shu-soft); color:var(--shu); font-weight:700;}

/* 赤ペン採点マーク(シグネチャ) */
.mark{display:flex; justify-content:center; margin:6px 0 2px; height:96px;}
.mark svg{width:96px; height:96px;}
.mark path{fill:none; stroke:var(--shu); stroke-width:7; stroke-linecap:round;
  stroke-dasharray:400; stroke-dashoffset:400; animation:draw .5s ease forwards;}
@keyframes draw{to{stroke-dashoffset:0;}}
@media(prefers-reduced-motion:reduce){ .mark path{animation:none; stroke-dashoffset:0;} .view.active{animation:none;} }

/* ---------- term / formula cards ---------- */
.termcard .word{font-size:1.5rem; font-weight:700;}
.termcard .yaku{font-size:1.05rem; margin-top:2px;}
.fx{background:var(--mist); border-radius:10px; padding:12px 14px;
  font-family:"Consolas","Georgia",serif; font-size:1.02rem; overflow-x:auto;}
.label{font-size:0.7rem; color:var(--sub); font-weight:700; letter-spacing:0.1em; margin:12px 0 3px;}
.subtabs{display:flex; gap:8px; margin-bottom:14px;}
.subtabs button{flex:1; border:1.5px solid var(--line); background:var(--card);
  border-radius:10px; padding:9px; font-size:0.88rem;}
.subtabs button.active{border-color:var(--ai); background:var(--ai-soft); color:var(--ai); font-weight:700;}

/* ---------- lab ---------- */
.labwrap{display:flex; flex-direction:column; gap:10px;}
.labcanvases{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
.labcanvases figure{margin:0;}
.labcanvases canvas{width:100%; border-radius:10px; background:#111; display:block;}
.labcanvases figcaption{font-size:0.72rem; color:var(--sub); text-align:center; margin-top:3px;}
.modes{display:flex; flex-wrap:wrap; gap:8px;}
.modes button{border:1.5px solid var(--line); background:var(--card);
  border-radius:999px; padding:7px 12px; font-size:0.8rem;}
.modes button.sel{border-color:var(--ai); background:var(--ai-soft); color:var(--ai); font-weight:700;}
input[type=range]{width:100%;}
video{display:none;}

/* ---------- stats ---------- */
.bar{height:10px; border-radius:999px; background:var(--mist); overflow:hidden; margin:4px 0 10px;}
.bar>span{display:block; height:100%; background:var(--ai); border-radius:999px;}
.bar>span.low{background:var(--shu);}
textarea{width:100%; min-height:140px; border:1.5px solid var(--line); border-radius:10px;
  padding:10px; font-family:"Consolas",monospace; font-size:0.8rem;}
.toast{position:fixed; left:50%; bottom:90px; transform:translateX(-50%);
  background:var(--ink); color:#fff; padding:10px 18px; border-radius:999px;
  font-size:0.85rem; opacity:0; pointer-events:none; transition:opacity .25s; z-index:50;}
.toast.show{opacity:0.95;}
details{margin-top:10px;} summary{cursor:pointer; font-weight:700; font-size:0.88rem;}
</style>
</head>

<script>

   ========================================================= */

/* ---------- IndexedDB ---------- */
const DB_NAME="eshikaku_v1", DB_VER=1;
let db;
function openDB(){return new Promise((res,rej)=>{
  const rq=indexedDB.open(DB_NAME,DB_VER);
  rq.onupgradeneeded=e=>{
    const d=e.target.result;
    if(!d.objectStoreNames.contains("questions")) d.createObjectStore("questions",{keyPath:"id"});
    if(!d.objectStoreNames.contains("logs")) d.createObjectStore("logs",{keyPath:"answerId"});
    if(!d.objectStoreNames.contains("srs")) d.createObjectStore("srs",{keyPath:"questionId"});
    if(!d.objectStoreNames.contains("meta")) d.createObjectStore("meta",{keyPath:"key"});
  };
  rq.onsuccess=e=>{db=e.target.result; res(db);};
  rq.onerror=()=>rej(rq.error);
});}
function tx(store,mode,fn){return new Promise((res,rej)=>{
  const t=db.transaction(store,mode), s=t.objectStore(store);
  const out=fn(s);
  t.oncomplete=()=>res(out&&out.result!==undefined?out.result:out);
  t.onerror=()=>rej(t.error);
});}
function put(store,val){return tx(store,"readwrite",s=>s.put(val));}
function getAll(store){return new Promise((res,rej)=>{
  const t=db.transaction(store,"readonly"), rq=t.objectStore(store).getAll();
  rq.onsuccess=()=>res(rq.result); rq.onerror=()=>rej(rq.error);
});}
function getOne(store,key){return new Promise((res,rej)=>{
  const t=db.transaction(store,"readonly"), rq=t.objectStore(store).get(key);
  rq.onsuccess=()=>res(rq.result); rq.onerror=()=>rej(rq.error);
});}
function clearStore(store){return tx(store,"readwrite",s=>s.clear());}

/* ---------- 用語カード(組込) ---------- */

/* ---------- 誤答原因 ---------- */
const ERROR_REASONS=[
 "用語の意味が分からない","英語用語が読めない・思い出せない","数式の意味が分からない",
 "数式の計算を間違えた","似た概念と混同した","コードの形が読めなかった",
 "問題文を読み違えた","選択肢で迷った","たまたま知識が抜けていた"];

/* ---------- 間隔反復エンジン ---------- */
const DAY=86400000;
function today0(){const d=new Date(); d.setHours(0,0,0,0); return d.getTime();}
function fmtDate(ts){const d=new Date(ts); return `${d.getMonth()+1}/${d.getDate()}`;}

function nextReview(srs,isCorrect,conf){
  // conf: 0=低い 1=普通 2=高い
  const s=srs||{streak:0,lapses:0,overconfident:0,stage:0};
  let days;
  if(!isCorrect){
    s.streak=0; s.lapses=(s.lapses||0)+1; s.stage=0;
    if(conf===2){ s.overconfident=(s.overconfident||0)+1; days=1; } // 自信あり誤答=最優先・翌日
    else days=1;
  }else{
    s.streak=(s.streak||0)+1; s.lapses=0;
    if(conf===0) days=3;            // 正解・自信低い
    else if(conf===1) days=7;       // 正解・普通
    else days=(s.streak>=3?30:14);  // 正解・高い(連続で30日へ)
    s.stage=Math.min((s.stage||0)+1,6);
  }
  s.due=today0()+days*DAY;
  s.lastCorrect=isCorrect; s.lastConf=conf; s.lastAt=Date.now();
  return s;
}
function priorityInfo(srs){
  // 優先度スコアと表示理由
  if(!srs) return {score:10,why:"新規"};
  const overdue=Math.max(0,Math.floor((today0()-srs.due)/DAY));
  if(srs.lastCorrect===false&&srs.lastConf===2) return {score:100+overdue,why:"自信ありで誤答"};
  if((srs.lapses||0)>=2) return {score:90+overdue,why:`${srs.lapses}回連続で誤答`};
  if(overdue>=1) return {score:60+overdue,why:`復習期限を${overdue}日超過`};
  if(srs.lastCorrect===true&&srs.lastConf===0) return {score:50,why:"正解したが自信度が低い"};
  return {score:20,why:"定着確認"};
}
</script>

function dueQuestions(){

  return QUESTIONS.filter(q=>SRS[q.id]&&SRS[q.id].due<t0)
    .sort((a,b)=>priorityInfo(SRS[b.id]).score-priorityInfo(SRS[a.id]).score);
}
function newQuestions(){return QUESTIONS.filter(q=>!SRS[q.id]);}
function streakDays(){
  const days=new Set(LOGS.map(l=>{const d=new Date(l.answeredAt); d.setHours(0,0,0,0); return d.getTime();}));
  let n=0, t=today0();
  if(!days.has(t)) t-=DAY; // 今日未学習なら昨日から数える
  while(days.has(t)){n++; t-=DAY;}
  return n;
}
function accuracy(logs){if(!logs.length)return null; return Math.round(100*logs.filter(l=>l.isCorrect).length/logs.length);}

let session=null;
function startSession(list,title){

function updateGradeBtn(){$("#btnGrade").disabled=!(session.sel!==null&&session.conf!==null);}

async function grade(){
  const q=session.list[session.idx];
  const isCorrect=session.sel===q.answer;
  if(isCorrect) session.correct++;
  const timeSec=Math.round((Date.now()-session.qStart)/1000);
  const srs=nextReview(SRS[q.id],isCorrect,session.conf);
  srs.questionId=q.id; SRS[q.id]=srs; await put("srs",srs);
  const log={answerId:"a"+Date.now()+Math.random().toString(36).slice(2,6),
    questionId:q.id,answeredAt:Date.now(),isCorrect,selectedAnswer:session.sel,
    confidence:session.conf,answerTimeSeconds:timeSec,errorReason:null,
    repetitionStage:srs.stage,sourceDevice:/Mobi/.test(navigator.userAgent)?"スマホ":"PC"};
  LOGS.push(log); await put("logs",log); session.lastLog=log;
  renderFeedback(q,isCorrect);
}

    const tag=(labMode==="pool")?"pool":(labMode==="sobel"?"sobel":"");
    let qs=QUESTIONS.filter(q=>q.type==="lab"&&(!tag||q.labTag===tag));
    if(!qs.length) qs=QUESTIONS.filter(q=>q.type==="lab");
    if(!qs.length){toast("画像解析の問題が未登録です"); return;}
    startSession(shuffle(qs),"画像解析ラボ 確認問題");
  };
  renderLabCtl();
}
function renderLabCtl(){
  const el=$("#labCtl"); if(!el) return;
  if(labMode==="binary"){
    el.innerHTML=`<div class="label">閾値:<span id="thv">${labThresh}</span></div>
    <input type="range" min="0" max="255" value="${labThresh}" id="thr">`;
    $("#thr").oninput=e=>{labThresh=+e.target.value; $("#thv").textContent=labThresh;};
  }else if(labMode==="pool"){
    el.innerHTML=`<div class="confbar">
      <button id="pMax" class="${labPool==="max"?"sel":""}">Max Pooling</button>
      <button id="pAvg" class="${labPool==="avg"?"sel":""}">Average Pooling</button></div>`;
    $("#pMax").onclick=()=>{labPool="max"; renderLabCtl();};
    $("#pAvg").onclick=()=>{labPool="avg"; renderLabCtl();};
  }else if(labMode==="lowres"){
    el.innerHTML=`<div class="confbar">
      <button data-r="224">224</button><button data-r="64" class="sel">64</button><button data-r="32">32</button></div>`;
    el.querySelectorAll("button").forEach(b=>b.onclick=()=>{
      labLowres=+b.dataset.r; el.querySelectorAll("button").forEach(x=>x.classList.toggle("sel",x===b));});
  }else el.innerHTML="";
}
let labLowres=64;
async function startCamera(){
  try{
    labStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment",width:{ideal:640}},audio:false});
    const v=$("#labVideo"); v.srcObject=labStream; await v.play();
    labLoop();
    toast("カメラを起動しました");
  }catch(e){ toast("カメラを起動できません:"+e.name); }
}
function stopCamera(){
  if(labRAF) cancelAnimationFrame(labRAF), labRAF=null;
  if(labStream){labStream.getTracks().forEach(t=>t.stop()); labStream=null;}
}
function labLoop(){
  const v=$("#labVideo"), co=$("#cvOrig"), cp=$("#cvProc");
  if(!co||!labStream){stopCamera(); return;}
  const w=320, h=Math.round(w*(v.videoHeight/v.videoWidth||0.75));
  co.width=w; co.height=h; cp.width=w; cp.height=h;
  const g=co.getContext("2d",{willReadFrequently:true});
  g.drawImage(v,0,0,w,h);
  const src=g.getImageData(0,0,w,h);
  const gp=cp.getContext("2d");
  gp.putImageData(processImage(src,w,h),0,0);
  labRAF=requestAnimationFrame(labLoop);
}
function processImage(src,w,h){
  const d=src.data, out=new ImageData(w,h), o=out.data;
  const gray=new Float32Array(w*h);
  for(let i=0,p=0;i<d.length;i+=4,p++) gray[p]=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];
  const setPix=(p,r,g2,b)=>{const i=p*4; o[i]=r; o[i+1]=g2; o[i+2]=b; o[i+3]=255;};
  switch(labMode){
    case "gray": for(let p=0;p<gray.length;p++) setPix(p,gray[p],gray[p],gray[p]); break;
    case "binary": for(let p=0;p<gray.length;p++){const v=gray[p]>labThresh?255:0; setPix(p,v,v,v);} break;
    case "rgb":{ // 縦3分割でR/G/B表示
      const h3=Math.floor(h/3);
      for(let y=0;y<h;y++) for(let x=0;x<w;x++){
        const p=y*w+x, i=p*4;
        if(y<h3) setPix(p,d[i],0,0);
        else if(y<h3*2) setPix(p,0,d[i+1],0);
        else setPix(p,0,0,d[i+2]);
      } break;}
    case "blur":{
      const k=2;
      for(let y=0;y<h;y++) for(let x=0;x<w;x++){
        let s=0,n=0;
        for(let dy=-k;dy<=k;dy++) for(let dx=-k;dx<=k;dx++){
          const yy=y+dy,xx=x+dx;
          if(yy>=0&&yy<h&&xx>=0&&xx<w){s+=gray[yy*w+xx]; n++;}
        }
        const v=s/n; setPix(y*w+x,v,v,v);
      } break;}
    case "sobel":{
      for(let y=1;y<h-1;y++) for(let x=1;x<w-1;x++){
        const p=y*w+x;
        const gx=-gray[p-w-1]-2*gray[p-1]-gray[p+w-1]+gray[p-w+1]+2*gray[p+1]+gray[p+w+1];
        const gy=-gray[p-w-1]-2*gray[p-w]-gray[p-w+1]+gray[p+w-1]+2*gray[p+w]+gray[p+w+1];
        const v=Math.min(255,Math.hypot(gx,gy)); setPix(p,v,v,v);
      } break;}
    case "lowres":{
      const s=Math.max(1,Math.round(w/labLowres));
      for(let y=0;y<h;y++) for(let x=0;x<w;x++){
        const sy=Math.floor(y/s)*s, sx=Math.floor(x/s)*s, q=(sy*w+sx)*4;
        setPix(y*w+x,d[q],d[q+1],d[q+2]);
      } break;}
    case "pool":{
      const s=8;
      for(let by=0;by<h;by+=s) for(let bx=0;bx<w;bx+=s){
        let mx=0,sum=0,n=0;
        for(let y=by;y<Math.min(by+s,h);y++) for(let x=bx;x<Math.min(bx+s,w);x++){
          const v=gray[y*w+x]; mx=Math.max(mx,v); sum+=v; n++;}
        const v=labPool==="max"?mx:sum/n;
        for(let y=by;y<Math.min(by+s,h);y++) for(let x=bx;x<Math.min(bx+s,w);x++) setPix(y*w+x,v,v,v);
      } break;}
    default: return src;
  }
  return out;
}
</script>
<script>
"use strict";
/* ---------- 記録・データ管理 ---------- */
function renderStats(){
  const acc=accuracy(LOGS), st=streakDays();
  // 分野別
  const cats=[...new Set(QUESTIONS.map(q=>q.category))];
  const catRows=cats.map(c=>{
    const ids=new Set(QUESTIONS.filter(q=>q.category===c).map(q=>q.id));
    const lg=LOGS.filter(l=>ids.has(l.questionId));
    const a=accuracy(lg);
    return {c,a,n:lg.length};
  }).filter(r=>r.n>0).sort((x,y)=>(x.a??100)-(y.a??100));
  // 誤答原因
  const reasons={};
  LOGS.filter(l=>!l.isCorrect&&l.errorReason).forEach(l=>reasons[l.errorReason]=(reasons[l.errorReason]||0)+1);
  const reasonRows=Object.entries(reasons).sort((a,b)=>b[1]-a[1]);
  const overconf=LOGS.filter(l=>!l.isCorrect&&l.confidence===2).length;
  const lowcorrect=LOGS.filter(l=>l.isCorrect&&l.confidence===0).length;

  $("#view-stats").innerHTML=`
  <div class="card"><h2>全体</h2>
    <div class="row">
      <div class="stat"><div class="v">${LOGS.length}</div><div class="l">総回答数</div></div>
      <div class="stat"><div class="v">${acc===null?"–":acc+"%"}</div><div class="l">総合正答率</div></div>
      <div class="stat"><div class="v">${st}日</div><div class="l">継続学習</div></div>
    </div>
    <div class="row" style="margin-top:10px">
      <div class="stat"><div class="v" style="color:var(--shu)">${overconf}</div><div class="l">自信あり誤答</div></div>
      <div class="stat"><div class="v">${lowcorrect}</div><div class="l">自信なし正答</div></div>
    </div>
  </div>
  <div class="card"><h2>分野別正答率</h2>
    ${catRows.length?catRows.map(r=>`
      <div style="display:flex; justify-content:space-between; font-size:0.88rem"><span>${esc(r.c)}</span><b>${r.a}%</b></div>
      <div class="bar"><span class="${r.a<60?"low":""}" style="width:${r.a}%"></span></div>`).join("")
     :`<div class="muted">まだ回答記録がありません。</div>`}
  </div>
  <div class="card"><h2>誤答原因の内訳</h2>
    ${reasonRows.length?reasonRows.map(([r,n])=>`<div style="display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px solid var(--line); font-size:0.88rem"><span>${esc(r)}</span><b>${n}回</b></div>`).join("")
     :`<div class="muted">誤答時に原因を選ぶと、ここに集計されます。</div>`}
  </div>
  <div class="card"><h2>データ管理(PC⇄スマホ同期)</h2>
    <div class="muted">JSONを書き出し、もう一方の端末で読み込むと学習履歴を同期できます。</div>
    <button class="btn ghost small" id="dExport">学習データを書き出す(JSON)</button>
    <button class="btn ghost small" id="dImport">学習データを読み込む</button>
    <input type="file" id="dFile" accept=".json" style="display:none">
    <details><summary>問題を追加する(JSON貼り付け)</summary>
      <div class="muted" style="margin:6px 0">設問は後工程でGPT/Claudeに下のスキーマで作らせて、ここへ貼り付けます。</div>
      <pre style="font-size:0.7rem">[{"id":"q100","category":"深層学習","topic":"BatchNorm",
"difficulty":"標準","type":"choice",
"question":"問題文","code":"(任意)",
"choices":["A","B","C","D"],"answer":1,
"explanation":"解説","terms":["ReLU"],
"formulas":["勾配降下法"],"labTag":""}]</pre>
      <textarea id="qJson" placeholder='[ {…}, {…} ]'></textarea>
      <button class="btn primary small" id="qAdd">問題を取り込む</button>
    </details>
    <details><summary>危険な操作</summary>
      <button class="btn shu small" id="dReset">学習履歴をすべて削除</button>
    </details>
  </div>`;
  $("#dExport").onclick=exportData;
  $("#dImport").onclick=()=>$("#dFile").click();
  $("#dFile").onchange=importData;
  $("#qAdd").onclick=importQuestions;
  $("#dReset").onclick=async()=>{
    if(!confirm("回答履歴と復習予定をすべて削除します。よろしいですか?(問題データは残ります)")) return;
    await clearStore("logs"); await clearStore("srs");
    await loadAll(); toast("削除しました"); renderStats();
  };
}
async function exportData(){
  const data={app:"eshikaku",version:1,exportedAt:new Date().toISOString(),
    questions:await getAll("questions"),logs:await getAll("logs"),srs:await getAll("srs")};
  const blob=new Blob([JSON.stringify(data,null,1)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=`eshikaku_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(a.href);
  toast("書き出しました");
}
async function importData(e){
  const f=e.target.files[0]; if(!f) return;
  try{
    const data=JSON.parse(await f.text());
    if(data.app!=="eshikaku") throw new Error("形式が違います");
    for(const q of data.questions||[]) await put("questions",q);
    for(const l of data.logs||[]) await put("logs",l);           // answerIdで重複排除
    for(const s of data.srs||[]){                                 // 新しい方を採用
      const cur=SRS[s.questionId];
      if(!cur||(s.lastAt||0)>(cur.lastAt||0)) await put("srs",s);
    }
    await loadAll(); toast("読み込みました"); renderStats();
  }catch(err){ toast("読み込み失敗:"+err.message); }
  e.target.value="";
}
async function importQuestions(){
  try{
    const arr=JSON.parse($("#qJson").value);
    if(!Array.isArray(arr)) throw new Error("配列で貼り付けてください");
    let n=0;
    for(const q of arr){
      if(!q.id||!q.question||!Array.isArray(q.choices)||q.choices.length<2||typeof q.answer!=="number")
        throw new Error(`必須項目不足: ${q.id||"(id無し)"}`);
      q.category=q.category||"未分類"; q.topic=q.topic||""; q.type=q.type||"choice";
      await put("questions",q); n++;
    }
    await loadAll(); $("#qJson").value="";
    toast(`${n}問を取り込みました`); renderStats();
  }catch(err){ toast("取り込み失敗:"+err.message); }
}

/* ---------- 初期化 ---------- */
(async function init(){
  $("#hdrDate").textContent=new Date().toLocaleDateString("ja-JP",{month:"long",day:"numeric",weekday:"short"});
  await openDB();
  const seeded=await getOne("meta","seeded");
  if(!seeded){
    for(const q of SEED_QUESTIONS) await put("questions",q);
    await put("meta",{key:"seeded",value:true,at:Date.now()});
  }
  await loadAll();
  renderHome();
})();
window.addEventListener("pagehide",stopCamera);
</script>
<script>
"use strict";
/* ---------- PWA: Service Worker 登録と更新 ---------- */
const APP_VERSION="v0.2.0"; // sw.js の CACHE_NAME と揃える
if("serviceWorker" in navigator && location.protocol.indexOf("http")===0){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("./sw.js").catch(()=>{});
    let reloaded=false;
    navigator.serviceWorker.addEventListener("controllerchange",()=>{
      if(reloaded) return; reloaded=true;
      // 学習セッション中は自動リロードせず、案内だけ出す
      if(typeof session!=="undefined" && session){
        toast("新しい版があります。区切りで再読み込みしてください");
      }else{
        location.reload();
      }
    });
  });
}
</script>
